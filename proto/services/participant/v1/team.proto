syntax = "proto3";

package services.participant.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/loanem-backend/protos/pb/services/participant/v1;participantv1";

service TeamService {
    rpc AddClasses(AddClassesRequest) returns (AddClassesResponse);
    rpc GetClassesByCourseID(GetClassesByCourseIDRequest) returns (GetClassesByCourseIDResponse);

    rpc AddTeams(AddTeamsRequest) returns (AddTeamsResponse);
}

message AddClassesRequest {
    int32 course_id = 1;
    repeated string names = 2;
}

message AddClassesResponse {}

message Class {
    int32 id = 1;
    int32 course_id = 2;
    uint32 name = 3;
    google.protobuf.Timestamp created_at = 4;
    google.protobuf.Timestamp updated_at = 5;
}

message GetClassesByCourseIDRequest {
    int32 course_id = 1;
}

message GetClassesByCourseIDResponse {
    repeated Class classes = 1;
}

message AddTeamsRequest {
    int32 class_id = 1;
    int32 number_of_teams = 2;
}

message AddTeamsResponse {}
