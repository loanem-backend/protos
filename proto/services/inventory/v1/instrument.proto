syntax = "proto3";

package services.inventory.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/loanem-backend/protos/pb/services/inventory/v1;inventoryv1";

service InstrumentService {
    rpc AddInstrument(AddInstrumentRequest) returns (AddInstrumentResponse);
    rpc GetAllInstruments(GetAllInstrumentsRequest) returns (GetAllInstrumentsResponse);
    rpc SetInstrumentPicture(SetInstrumentPictureRequest) returns (SetInstrumentPictureResponse);
    rpc GetInstrumentsByToolkitID(GetInstrumentsByToolkitIDRequest) returns (GetInstrumentsByToolkitIDResponse);
}

message AddInstrumentRequest {
    string name = 1;
}

message AddInstrumentResponse {
    int32 id = 1;
}

message Instrument {
    int32 id = 1;
    string name = 2;
    google.protobuf.Timestamp created_at = 3;
    google.protobuf.Timestamp updated_at = 4;
}

message GetAllInstrumentsRequest {}

message GetAllInstrumentsResponse {
    repeated Instrument instruments = 1;
}

message SetInstrumentPictureRequest {
    int32 id = 1;
    string key = 2;
}

message SetInstrumentPictureResponse {}

message GetInstrumentsByToolkitIDRequest {
    int32 toolkit_id = 1;
}

message GetInstrumentsByToolkitIDResponse {
    repeated Instrument instruments = 1;
}
