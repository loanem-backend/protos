syntax = "proto3";

package services.inventory.v1;
option go_package = "github.com/loanem-backend/protos/pb/services/inventory/v1;inventoryv1";

service ToolkitService {
    rpc AddToolkit(AddToolkitRequest) returns (AddToolkitResponse);
    rpc AddToolkitInstrument(AddToolkitInstrumentRequest) returns (AddToolkitInstrumentResponse);

    rpc SetToolkitCourseID(SetToolkitCourseIDRequest) returns (SetToolkitCourseIDResponse);
}

message AddToolkitRequest {
    string kit_name = 1;
    int32 total_count = 2;
}

message AddToolkitResponse {
    int32 id = 1;
}

message SetToolkitCourseIDRequest {
    int32 toolkit_id = 1;
    int32 course_id = 2;
}

message SetToolkitCourseIDResponse {}

message AddToolkitInstrumentRequest {
    int32 toolkit_id = 1;
    int32 instrument_id = 2;
}

message AddToolkitInstrumentResponse {}
